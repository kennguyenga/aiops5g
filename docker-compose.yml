services:
  # ─── 5G Core Network Functions ──────────────────────────────────────
  # Host ports are renumbered to 18001-18007 + 19000-19003 to avoid
  # conflicts with anything else on your machine. Container ports stay at
  # 8001-8007 + 9000-9003 so internal Docker DNS calls work unchanged.
  # Browser hits the frontend at http://localhost:5173 as before.

  nrf:
    build: .
    environment: { SERVICE_NAME: nrf, PORT: 8001 }
    ports: ["18001:8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

  udm:
    build: .
    environment: { SERVICE_NAME: udm, PORT: 8003 }
    ports: ["18003:8003"]
    depends_on: { nrf: { condition: service_healthy } }

  ausf:
    build: .
    environment:
      SERVICE_NAME: ausf
      PORT: 8002
      NRF_URL: http://nrf:8001
      UDM_URL: http://udm:8003
    ports: ["18002:8002"]
    depends_on:
      udm: { condition: service_started }
      nrf: { condition: service_healthy }

  amf:
    build: .
    environment:
      SERVICE_NAME: amf
      PORT: 8004
      NRF_URL: http://nrf:8001
      AUSF_URL: http://ausf:8002
      UDM_URL: http://udm:8003
      SMF_URL: http://smf:8005
    ports: ["18004:8004"]
    depends_on:
      ausf: { condition: service_started }
      udm: { condition: service_started }

  smf:
    build: .
    environment:
      SERVICE_NAME: smf
      PORT: 8005
      NRF_URL: http://nrf:8001
      PCF_URL: http://pcf:8007
      UPF_URL: http://upf:8006
    ports: ["18005:8005"]
    depends_on:
      nrf: { condition: service_healthy }
      pcf: { condition: service_started }
      upf: { condition: service_started }

  upf:
    build: .
    environment:
      SERVICE_NAME: upf
      PORT: 8006
      NRF_URL: http://nrf:8001
    ports: ["18006:8006"]
    depends_on: { nrf: { condition: service_healthy } }

  pcf:
    build: .
    environment:
      SERVICE_NAME: pcf
      PORT: 8007
      NRF_URL: http://nrf:8001
    ports: ["18007:8007"]
    depends_on: { nrf: { condition: service_healthy } }

  # ─── Telemetry & Control Plane ──────────────────────────────────────
  collector:
    build: .
    environment:
      SERVICE_NAME: collector
      PORT: 9000
      NRF_URL: http://nrf:8001
      AUSF_URL: http://ausf:8002
      UDM_URL: http://udm:8003
      AMF_URL: http://amf:8004
      SMF_URL: http://smf:8005
      UPF_URL: http://upf:8006
      PCF_URL: http://pcf:8007
    ports: ["19000:9000"]
    depends_on:
      amf: { condition: service_started }
      smf: { condition: service_started }

  orchestrator:
    build: .
    environment:
      SERVICE_NAME: orchestrator
      PORT: 9001
      NRF_URL: http://nrf:8001
      AUSF_URL: http://ausf:8002
      UDM_URL: http://udm:8003
      AMF_URL: http://amf:8004
      SMF_URL: http://smf:8005
      UPF_URL: http://upf:8006
      PCF_URL: http://pcf:8007
    ports: ["19001:9001"]
    depends_on:
      amf: { condition: service_started }

  ml_engine:
    build: .
    environment:
      SERVICE_NAME: ml_engine
      PORT: 9002
      COLLECTOR_URL: http://collector:9000
    ports: ["19002:9002"]
    depends_on: [collector]

  llm_agent:
    build: .
    environment:
      SERVICE_NAME: llm_agent
      PORT: 9003
      COLLECTOR_URL: http://collector:9000
      ORCHESTRATOR_URL: http://orchestrator:9001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-5}
    ports: ["19003:9003"]
    depends_on: [collector, orchestrator]

  # ─── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports: ["5173:80"]
    depends_on: [orchestrator, collector, ml_engine, llm_agent]
